# Vimana kiosk configuration.
#
# Paste the "Projector URL" from the Vimana settings panel (the gear
# button on the radar page) between the quotes. It already contains
# your radius / sound / constellations choices, and points at the
# server's LAN address.
#
# This file is read by kiosk.sh. Install it at /etc/vimana-kiosk.conf.

VIMANA_URL="http://192.168.1.50:8642/?display=1&radius=40&sound=1&constellations=0"
