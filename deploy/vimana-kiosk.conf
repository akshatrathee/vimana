# Vimana kiosk configuration.
#
# The plain server URL is usually all you need -- the page has no
# visible controls by default, driven by default_settings.cfg on the
# server. Only use a URL with query parameters (the "Projector URL"
# from the Vimana settings panel's gear button) if THIS display should
# use different values than the site-wide default.
#
# This file is read by kiosk.sh. Install it at /etc/vimana-kiosk.conf.

