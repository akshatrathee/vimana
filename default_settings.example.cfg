# Vimana default display settings.
# Applied whenever the page loads without URL query overrides
# (e.g. ?radius=60 always wins over the radius_nm line below).
# Edit by hand and refresh the page, or use the gear icon in the app.
#
# You don't need to create this file yourself -- Vimana writes
# default_settings.cfg automatically the first time you save settings
# from the gear icon, using conservative built-in defaults (everything
# below, unchanged) until then. This file is just a reference showing
# the format, matching the app's built-in fallback values.

radius_nm=40
sound=0
constellations=0
hud=1
fullscreen=0
